<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 Pizza Delivery - Доставка пиццы</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🍕</span>
                <h1>Pizza Delivery</h1>
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('menu')">🍕 Меню</button>
            <button class="tab-btn" onclick="showTab('orders')">📋 Мои заказы</button>
            <button class="tab-btn" onclick="showTab('profile')">👤 Профиль</button>
        </div>

        <!-- Tab: Menu -->
        <div id="menuTab" class="tab-content active">
            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 Поиск пиццы..." onkeyup="filterPizzas()">
                <label class="filter-checkbox">
                    <input type="checkbox" id="vegetarianFilter" onchange="filterPizzas()"> 🥬 Только вегетарианские
                </label>
            </div>
            <div id="pizzasGrid" class="pizzas-grid">
                <div class="loading">Загрузка пицц...</div>
            </div>
        </div>

        <!-- Tab: Orders -->
        <div id="ordersTab" class="tab-content">
            <div class="orders-header">
                <h2>История заказов</h2>
                <button class="refresh-btn" onclick="loadOrders()">🔄 Обновить</button>
            </div>
            <div id="ordersList" class="orders-list">
                <div class="loading">Загрузка заказов...</div>
            </div>
        </div>

        <!-- Tab: Profile -->
        <div id="profileTab" class="tab-content">
            <div class="profile-card">
                <h2>👤 Информация о клиенте</h2>
                <div class="client-selector">
                    <label>Выберите клиента:</label>
                    <select id="clientSelect" onchange="loadClientData()">
                        <option value="">-- Выберите клиента --</option>
                    </select>
                </div>
                <div id="clientInfo" class="client-info"></div>
                <div id="clientAddresses" class="client-addresses"></div>
                <div class="loyalty">
                    <span>🎁 Бонусные баллы:</span>
                    <strong id="loyaltyPoints">0</strong>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛒 Ваша корзина</h2>
                <span class="close" onclick="toggleCart()">&times;</span>
            </div>
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-total">
                <span>Итого:</span>
                <strong id="cartTotal">0 ₽</strong>
            </div>
            <div class="cart-actions">
                <button class="btn-secondary" onclick="toggleCart()">Продолжить покупки</button>
                <button class="btn-primary" onclick="checkout()">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
